<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy App - Royale Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

<div id="app">
    <header>
        <div class="user-info">
            <h2 id="userName">Samy App</h2>
            <p id="userStatus" style="margin:0; font-size: 11px;"><span class="status-dot"></span> Verificando...</p>
        </div>
        <div id="userBalance" style="font-weight: 800; color: var(--primary); font-size: 20px;">$0</div>
    </header>

    <div id="screen-home" class="screen active">
        <div class="card" style="height: 200px; display: flex; align-items: center; justify-content: center; background: #f1f5f9;">
            <p>Bienvenido a Samy App</p>
        </div>
    </div>

    <div id="screen-aduana" class="screen">
        <h3>Gestión de Aduana</h3>
        <div id="lista-aduana"></div>
    </div>

    <nav id="mainNav">
        <div class="nav-item active-nav" onclick="changeScreen('home', this)"><i class="fas fa-compass"></i>Mapa</div>
        <div id="nav-aduana-btn" class="nav-item" style="display:none;" onclick="changeScreen('aduana', this)">
            <i class="fas fa-passport"></i>Aduana <span id="count-badge" class="badge" style="display:none;">0</span>
        </div>
    </nav>
</div>

<div id="modal-review" class="modal-aduana">
    <div class="modal-content">
        <img id="view-foto-perfil" class="img-review">
        <button id="btn-aprobar-final" class="btn-main">Aprobar</button>
        <button onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script type="module">
    import { apiService } from './js/api.js';
    import { aduanaModule } from './js/aduana.js';

    // Vinculación global
    window.changeScreen = (type, el) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + type).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
        el.classList.add('active-nav');
    };
    
    window.abrirDetalleAduana = (user) => aduanaModule.abrirDetalle(user);
    window.cerrarModal = () => document.getElementById('modal-review').style.display = 'none';

    async function init() {
        console.log("Iniciando Samy App...");
        const params = new URLSearchParams(window.location.search);
        const phone = params.get('phone');
        
        // El teléfono del Soberano que definiste
        if (phone === "573145210546") {
            document.getElementById('nav-aduana-btn').style.display = 'block';
            const data = await apiService.getAspirantes();
            // Lógica para pintar la lista aquí o en aduana.js
        }
    }

    init();
</script>
</body> 
</html>
