<script>
    // 1. PRIORIDAD ABSOLUTA: Avisar a Telegram que existimos
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 2. CONFIGURACIÓN
    const SUPABASE_URL = "https://fsdqvdxvhqauyqczgsfb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. OBTENCIÓN DE DATOS (No bloqueante)
    const params = new URLSearchParams(window.location.search);
    const chatId = params.get('id') || (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : null);
    const phone = params.get('phone') || "000";
    const SOBERANO_PHONE = "573145210546";

    // 4. FUNCIÓN DE CARGA SEGURA
    async function initApp() {
        // Mostramos un estado inicial para que el usuario no vea la pantalla en blanco
        document.getElementById('display-name').innerText = "Sincronizando...";
        
        try {
            // Ejecutamos la lógica de verificación
            await checkUserStatus();
            
            // Suscribimos a cambios en tiempo real
            _supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public' }, () => {
                checkUserStatus();
            }).subscribe();

        } catch (error) {
            console.error("Error crítico:", error);
            // Si algo falla, al menos dejamos que la UI sea funcional
            showView('view-register'); 
        }
    }

    async function checkUserStatus() {
        if (phone === SOBERANO_PHONE) {
            showView('view-admin');
            document.getElementById('display-name').innerText = "Soberano Carlos";
            fetchAduana();
            return;
        }

        if (!chatId) {
            showView('view-register');
            return;
        }

        // Consultas en paralelo para ganar velocidad
        const [profileRes, preRes] = await Promise.all([
            _supabase.from('profiles').select('*').eq('id', chatId).maybeSingle(),
            _supabase.from('pre_registro').select('*').eq('id', chatId).maybeSingle()
        ]);

        if (profileRes.data) {
            showView('view-success');
            document.getElementById('display-name').innerText = profileRes.data.full_name;
        } else if (preRes.data) {
            showView('view-waiting');
            document.getElementById('display-name').innerText = "En Aduana";
        } else {
            showView('view-register');
            document.getElementById('display-name').innerText = "Nuevo Usuario";
        }
    }

    // El resto de tus funciones (registrar, aprobar, rechazar) se mantienen igual...
    // Pero asegúrate de llamar a initApp al final del script:
    
    initApp();
</script>
