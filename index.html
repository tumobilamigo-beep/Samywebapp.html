<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Samy App - Vercel Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Avisamos a Telegram inmediatamente
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        // Evita que el scroll del navegador interfiera con la app
        window.Telegram.WebApp.disableVerticalSwipedown();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --p: #0088cc; --d: #0f172a; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--d); margin: 0; color: #333;
            height: 100vh; overflow: hidden;
        }
        #app { background: white; height: 100vh; display: flex; flex-direction: column; }
        .screen { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .active { display: block !important; }
        .loader { text-align: center; margin-top: 100px; color: var(--p); }
        .btn-main { background: var(--p); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-loading" class="screen active">
        <div class="loader">
            <i class="fas fa-spinner fa-spin fa-3x"></i>
            <p>Sincronizando con el Soberano...</p>
        </div>
    </div>

    <div id="screen-register" class="screen">
        <h2 style="text-align:center">Registro Real</h2>
        <input type="text" id="regName" placeholder="Nombre Completo">
        <input type="number" id="regDoc" placeholder="Documento">
        <button class="btn-main" onclick="enviarAduana()">Solicitar Acceso</button>
    </div>

    <div id="screen-aduana" class="screen">
        <h3>Aduana (Soberano)</h3>
        <div id="lista-aduana"></div>
    </div>

    <div id="screen-home" class="screen">
        <h3>Samy App</h3>
        <p>¡Bienvenido al sistema!</p>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const _supabase = window.supabase.createClient(
        "https://fsdqvdxvhqauyqczgsfb.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM"
    );

    // Lógica de ID robusta para Vercel/Telegram
    const urlParams = new URLSearchParams(window.location.search);
    const chatId = tg.initDataUnsafe.user?.id?.toString() || urlParams.get('id');
    const phone = urlParams.get('phone') || "000";
    const SOBERANO_PHONE = "573145210546";

    async function check() {
        if (!chatId || chatId === "null") {
            // Si falla el ID, mostramos registro para que el usuario pueda intentar algo
            show('screen-register');
            return;
        }

        try {
            if (phone === SOBERANO_PHONE) {
                show('screen-aduana');
                loadAduana();
            } else {
                const { data: user } = await _supabase.from('profiles').select('*').eq('id', chatId).maybeSingle();
                if (user) {
                    show('screen-home');
                } else {
                    const { data: pre } = await _supabase.from('pre_registro').select('*').eq('id', chatId).maybeSingle();
                    if (pre) {
                        alert("Espera aprobación en Aduana");
                    } else {
                        show('screen-register');
                    }
                }
            }
        } catch (e) {
            console.error("Error en check:", e);
        }
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function enviarAduana() {
        const n = document.getElementById('regName').value;
        const d = document.getElementById('regDoc').value;
        if(!n || !d) return alert("Llena los datos");
        
        await _supabase.from('pre_registro').insert([{ id: chatId, full_name: n, phone: phone, numero_documento: d }]);
        tg.HapticFeedback.notificationOccurred('success');
        location.reload();
    }

    async function loadAduana() {
        const { data } = await _supabase.from('pre_registro').select('*');
        const cont = document.getElementById('lista-aduana');
        cont.innerHTML = data.map(u => `
            <div style="border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:10px;">
                <b>${u.full_name}</b><br>
                <button onclick="aprobar('${u.id}','${u.full_name}')" style="color:green">Aprobar</button>
            </div>
        `).join('') || 'No hay pendientes';
    }

    async function aprobar(id, nombre) {
        // Tu lógica de aprobación...
        tg.HapticFeedback.impactOccurred('medium');
    }

    // Inicio
    check();
</script>
</body>
</html>
