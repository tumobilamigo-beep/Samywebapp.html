<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Samy App - Royale Edition</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            // Desactiva el gesto de deslizar hacia abajo para cerrar, evita cierres accidentales
            window.Telegram.WebApp.disableVerticalSwipedown();
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary: #0088cc; 
            --dark: #0f172a; 
            --bg: #f8fafc;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--dark); margin: 0; padding: 0; 
            height: 100vh; overflow: hidden; color: #333;
        }

        /* Pantalla de Carga (Overlay) */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #app { 
            max-width: 500px; margin: 0 auto; background: white;
            height: 100vh; display: none; flex-direction: column; 
        }

        .screen { flex: 1; padding: 25px; display: none; overflow-y: auto; }
        .active { display: block !important; }

        header { 
            padding: 15px 20px; background: white; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }

        .card { 
            background: #fff; padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border: 1px solid #f0f0f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .btn-main { 
            background: var(--primary); color: white; border: none; 
            padding: 18px; border-radius: 12px; width: 100%; 
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #ddd; font-size: 16px; box-sizing: border-box;
        }

        nav { 
            height: 70px; border-top: 1px solid #eee; 
            display: flex; justify-content: space-around; align-items: center; background: white;
        }

        .nav-item { text-align: center; color: #94a3b8; font-size: 11px; flex: 1; }
        .nav-item.active-nav { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 15px; font-size: 14px;">Iniciando Samy App...</p>
    </div>

    <div id="app">
        <header>
            <div>
                <b id="header-name">Samy App</b><br>
                <small id="header-status" style="color: #64748b;">Verificando...</small>
            </div>
            <div id="header-balance" style="font-weight: bold; color: var(--primary);">$0</div>
        </header>

        <div id="screen-register" class="screen">
            <div style="text-align: center; margin-top: 20px;">
                <i class="fas fa-passport fa-4x" style="color: var(--primary);"></i>
                <h2>Bienvenido a la Aduana</h2>
                <p>Ingresa tus datos para solicitar acceso al Soberano.</p>
            </div>
            <input type="text" id="regName" placeholder="Nombre Completo">
            <input type="number" id="regDoc" placeholder="Número de Documento">
            <button class="btn-main" onclick="enviarAduana()">Solicitar Ingreso</button>
        </div>

        <div id="screen-waiting" class="screen">
            <div style="text-align: center; margin-top: 50px;">
                <i class="fas fa-clock fa-4x" style="color: #f1c40f;"></i>
                <h2>En Revisión</h2>
                <p>Tus datos están en la Aduana de Samy.<br>El Soberano te notificará pronto.</p>
            </div>
        </div>

        <div id="screen-home" class="screen">
            <div class="card" style="height: 200px; background: #f1f5f9; display: flex; align-items: center; justify-content: center;">
                <p style="color: #94a3b8;"><i class="fas fa-map-marked-alt"></i> Mapa Próximamente</p>
            </div>
            <button class="btn-main" style="margin-top: 20px;">Solicitar Servicio</button>
        </div>

        <div id="screen-aduana" class="screen">
            <h3>Panel del Soberano</h3>
            <div id="lista-aduana"></div>
        </div>

        <nav id="mainNav" style="display: none;">
            <div class="nav-item active-nav" onclick="changeScreen('home', this)"><i class="fas fa-home"></i>Inicio</div>
            <div id="nav-admin" class="nav-item" style="display:none;" onclick="changeScreen('aduana', this)"><i class="fas fa-shield-alt"></i>Aduana</div>
            <div class="nav-item"><i class="fas fa-wallet"></i>Billetera</div>
        </nav>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const SUPABASE_URL = "https://fsdqvdxvhqauyqczgsfb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const params = new URLSearchParams(window.location.search);
    const chatId = tg.initDataUnsafe.user?.id?.toString() || params.get('id');
    const phone = params.get('phone') || "000";
    const SOBERANO_PHONE = "573145210546";

    async function start() {
        try {
            if (phone === SOBERANO_PHONE) {
                setupSoberano();
            } else {
                await checkUser();
            }
        } catch (e) {
            console.error(e);
        } finally {
            // OCULTAR CARGA Y MOSTRAR APP
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }, 500);
        }
    }

    async function checkUser() {
        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', chatId).maybeSingle();
        
        if (profile) {
            renderView('screen-home', profile.full_name, "Usuario Activo", profile.balance_prepago);
            document.getElementById('mainNav').style.display = 'flex';
        } else {
            const { data: pre } = await _supabase.from('pre_registro').select('*').eq('id', chatId).maybeSingle();
            if (pre) {
                renderView('screen-waiting', "Invitado", "En Aduana", 0);
            } else {
                renderView('screen-register', "Nuevo", "Registro Requerido", 0);
            }
        }
    }

    function setupSoberano() {
        renderView('screen-aduana', "Soberano Carlos", "Control Total", "∞");
        document.getElementById('nav-admin').style.display = 'block';
        document.getElementById('mainNav').style.display = 'flex';
        fetchAduana();
    }

    function renderView(screenId, name, status, balance) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        document.getElementById('header-name').innerText = name;
        document.getElementById('header-status').innerText = status;
        document.getElementById('header-balance').innerText = balance === "∞" ? "∞" : "$" + balance;
    }

    async function enviarAduana() {
        const n = document.getElementById('regName').value;
        const d = document.getElementById('regDoc').value;
        if(!n || !d) return alert("Completa los datos");
        
        await _supabase.from('pre_registro').insert([{ id: chatId, full_name: n, phone: phone, numero_documento: d, status: 'pendiente' }]);
        tg.HapticFeedback.notificationOccurred('success');
        location.reload();
    }

    async function fetchAduana() {
        const { data } = await _supabase.from('pre_registro').select('*').eq('status', 'pendiente');
        const cont = document.getElementById('lista-aduana');
        cont.innerHTML = data && data.length ? data.map(u => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${u.full_name}</b><br><small>CC: ${u.numero_documento}</small></div>
                <button onclick="aprobar('${u.id}','${u.full_name}','${u.phone}')" style="color:green; border:none; background:none; font-size:24px;"><i class="fas fa-check-circle"></i></button>
            </div>
        `).join('') : '<p style="text-align:center;">No hay pendientes.</p>';
    }

    async function aprobar(id, nombre, tel) {
        const { error } = await _supabase.from('profiles').insert([{ id, full_name: nombre, phone: tel, balance_prepago: 0 }]);
        if (!error) {
            await _supabase.from('pre_registro').delete().eq('id', id);
            tg.HapticFeedback.impactOccurred('medium');
            fetchAduana();
            // Aquí puedes llamar a tu Edge Function para enviar el mensaje de Telegram
        }
    }

    function changeScreen(id, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        el.classList.add('active-nav');
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    // Suscripción Realtime
    _supabase.channel('public:profiles').on('postgres_changes', { event: '*', schema: 'public' }, () => start()).subscribe();

    start();
</script>
</body>
</html>
