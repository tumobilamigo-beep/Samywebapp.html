<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Aduana - Modo Rescate</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: sans-serif; background: #0f172a; margin: 0; color: #333; }
        #app { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-approve { color: #27ae60; background: none; border: none; font-size: 24px; cursor: pointer; }
        .btn-reject { color: #e74c3c; background: none; border: none; font-size: 24px; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-send { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; }
        h2 { color: #0088cc; text-align: center; }
        .status-msg { text-align: center; padding: 20px; color: #64748b; }
    </style>
</head>
<body>

<div id="app">
    <div id="header-simple" style="text-align: center; border-bottom: 1px solid #eee; margin-bottom: 20px; padding-bottom: 10px;">
        <h3 id="display-name">Cargando...</h3>
        <small id="display-status">Verificando...</small>
    </div>

    <div id="view-register" style="display:none;">
        <h2>Registro de Aduana</h2>
        <input type="text" id="regName" placeholder="Nombre Completo">
        <input type="number" id="regDoc" placeholder="Documento de Identidad">
        <button class="btn-send" onclick="registrar()">Solicitar Ingreso</button>
    </div>

    <div id="view-waiting" style="display:none;" class="status-msg">
        <i class="fas fa-user-clock fa-4x" style="color:#f1c40f;"></i>
        <p>Tu solicitud está en la <b>Aduana de Samy</b>.<br>Espera a que el Soberano te apruebe.</p>
    </div>

    <div id="view-admin" style="display:none;">
        <h2>Gestión de Aduana</h2>
        <div id="lista-pendientes"></div>
    </div>

    <div id="view-success" style="display:none;" class="status-msg">
        <i class="fas fa-check-circle fa-4x" style="color:#27ae60;"></i>
        <h2>¡Acceso Concedido!</h2>
        <p>Ya eres parte del sistema. Pronto habilitaremos el mapa.</p>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const _supabase = window.supabase.createClient(
        "https://fsdqvdxvhqauyqczgsfb.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzZHF2ZHh2aHFhdXlxY3pnc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU0OTIsImV4cCI6MjA5MDU0MTQ5Mn0.AA7CgSig_lgXSwVeZex-C1AExRKgN1sMuIBnzH9pfqM"
    );

    const params = new URLSearchParams(window.location.search);
    const chatId = params.get('id') || (tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : null);
    const phone = params.get('phone') || "000";
    const SOBERANO_PHONE = "573145210546";

    async function checkLogic() {
        if (phone === SOBERANO_PHONE) {
            showView('view-admin');
            document.getElementById('display-name').innerText = "Soberano Carlos";
            document.getElementById('display-status').innerText = "Panel de Control";
            fetchAduana();
            return;
        }

        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', chatId).maybeSingle();
        if (profile) {
            showView('view-success');
            document.getElementById('display-name').innerText = profile.full_name;
            document.getElementById('display-status').innerText = "Usuario Autorizado";
        } else {
            const { data: pre } = await _supabase.from('pre_registro').select('*').eq('id', chatId).maybeSingle();
            if (pre) {
                showView('view-waiting');
                document.getElementById('display-name').innerText = "Invitado";
                document.getElementById('display-status').innerText = "En Revisión";
            } else {
                showView('view-register');
                document.getElementById('display-name').innerText = "Nuevo Usuario";
                document.getElementById('display-status').innerText = "Pendiente de Registro";
            }
        }
    }

    function showView(id) {
        ['view-register', 'view-waiting', 'view-admin', 'view-success'].forEach(v => {
            document.getElementById(v).style.display = 'none';
        });
        document.getElementById(id).style.display = 'block';
    }

    async function registrar() {
        const n = document.getElementById('regName').value;
        const d = document.getElementById('regDoc').value;
        if (!n || !d) return alert("Llena los campos");

        await _supabase.from('pre_registro').insert([{ id: chatId, full_name: n, phone: phone, numero_documento: d }]);
        checkLogic();
    }

    async function fetchAduana() {
        const { data } = await _supabase.from('pre_registro').select('*');
        const cont = document.getElementById('lista-pendientes');
        cont.innerHTML = data && data.length ? data.map(u => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${u.full_name}</b><br><small>ID: ${u.id}</small></div>
                <div>
                    <button class="btn-approve" onclick="aprobar('${u.id}','${u.full_name}','${u.phone}')"><i class="fas fa-check-circle"></i></button>
                    <button class="btn-reject" onclick="rechazar('${u.id}')"><i class="fas fa-times-circle"></i></button>
                </div>
            </div>
        `).join('') : '<p style="text-align:center;">No hay solicitudes.</p>';
    }

    async function aprobar(id, n, t) {
        await _supabase.from('profiles').insert([{ id, full_name: n, phone: t, balance_prepago: 0 }]);
        await _supabase.from('pre_registro').delete().eq('id', id);
        tg.HapticFeedback.notificationOccurred('success');
    }

    async function rechazar(id) {
        await _supabase.from('pre_registro').delete().eq('id', id);
    }

    // Suscripción Realtime Simple
    _supabase.channel('schema-db-changes').on('postgres_changes', { event: '*', schema: 'public' }, () => {
        checkLogic();
    }).subscribe();

    checkLogic();
</script>
</body>
</html>
